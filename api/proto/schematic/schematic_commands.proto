syntax = "proto3";

package kiapi.schematic.types;

import "google/protobuf/any.proto";
import "common/types/base_types.proto";

// Search symbol libraries
message SearchSymbols
{
  string query  = 1;  // Search term (partial name match)
  string library = 2; // Optional: specific library to search
  int32 limit   = 3;  // Max results (default 20)
}

message SymbolSearchResult
{
  string library_nickname = 1;
  string symbol_name      = 2;
  string description      = 3;
  string keywords         = 4;
  string datasheet        = 5;
}

message SearchSymbolsResponse
{
  repeated SymbolSearchResult results = 1;
}

// Get component data (schematic symbol by KIID or library symbol by lib_id)
message GetComponentData
{
  kiapi.common.types.KIID            component_id = 1; // For schematic symbols
  kiapi.common.types.LibraryIdentifier lib_id      = 2; // For library symbols
}

message GetComponentDataResponse
{
  google.protobuf.Any component = 1;
  string summary = 2;  // Human-readable summary when component Any is not set
  // Structured data for library symbols (same as SymbolSearchResult)
  string library_nickname = 3;
  string symbol_name      = 4;
  string description      = 5;
  string keywords         = 6;
  string datasheet        = 7;
  // Symbol block size in mm (for layout/spacing)
  double width_mm  = 8;
  double height_mm = 9;
  int32 unit_count = 10;  // Units per package, 1 for single-unit
  repeated PinSummary pins = 11;  // Pin number and name for wiring (library and schematic symbols)
}

// Position in millimeters (schematic coordinates)
message PointMM
{
  double x_mm = 1;
  double y_mm = 2;
}

// Simplified component placement (within an active commit)
message AddComponent
{
  string library_nickname = 1;
  string symbol_name     = 2;
  string reference       = 3;
  string value           = 4;
  PointMM position       = 5;
  double rotation        = 6; // Degrees
  kiapi.common.types.KIID commit_id = 7;
  int32  unit            = 8; // Multi-unit symbols: 1-based unit (1=U?A, 2=U?B, ...). 0 or 1 = first unit.
}

message AddComponentResponse
{
  kiapi.common.types.KIID component_id = 1;
  int32 unit       = 2; // Unit actually placed (clamped to the symbol's unit count)
  int32 unit_count = 3; // Total units in the symbol; place the rest with the SAME reference
}

// Resolve (reference, pin_number) to sheet coordinates in mm
message GetPinPosition
{
  string reference  = 1;  // Component reference (e.g. "R1", "U1")
  string pin_number = 2;  // Pin number as string (e.g. "1", "A2")
}

message GetPinPositionResponse
{
  PointMM position = 1;  // Connection point (body; wire must start here to connect).
  // Orientation of the pin in degrees (0=right, 90=up, 180=left, 270=down) for label placement.
  optional double orientation_degrees = 2;
  // Tip of the pin (end away from symbol body); use for wire end and label. When set, wire body→tip.
  optional PointMM position_label = 3;
}

// One dangling (unconnected) endpoint: pin or wire end
message DanglingItem
{
  string reference  = 1;  // Component reference for pins; empty for wire ends
  string pin_number = 2;  // Pin number for pins; empty for wire ends
  double x_mm       = 3;
  double y_mm       = 4;
  string type       = 5;  // "pin" or "wire_end"
}

// Report of dangling wires and unconnected pins (lightweight ERC)
message GetDanglingReport
{
}

message GetDanglingReportResponse
{
  repeated DanglingItem items = 1;
}

// Place no-connect markers (SCH_NO_CONNECT) at the given points — typically
// pin connection points from GetDanglingReport/GetPinPosition. Points that
// already hold a no-connect marker are skipped, so the call is idempotent.
message CreateNoConnects
{
  repeated PointMM points = 1;
  kiapi.common.types.KIID commit_id = 2;  // optional open transaction
}

message CreateNoConnectsResponse
{
  int32 created = 1;  // markers actually added (pre-existing ones skipped)
}

// Summary of one pin (number, name, and position in mm)
message PinSummary
{
  string number = 1;
  string name   = 2;
  double x_mm   = 3;  // Pin position in schematic mm (optional)
  double y_mm   = 4;
}

// Axis-aligned bounding box in mm (includes body and pins)
message BoundingBox
{
  double min_x_mm = 1;
  double min_y_mm = 2;
  double max_x_mm = 3;
  double max_y_mm = 4;
}

// One schematic symbol property/field.
message ComponentFieldSummary
{
  string name    = 1;
  string value   = 2;
  bool visible   = 3;
}

// Summary of one component on the current sheet
message ComponentSummary
{
  string reference       = 1;
  string library_nickname = 2;
  string symbol_name     = 3;
  string value           = 4;
  repeated PinSummary pins = 5;
  PointMM position       = 6;  // Center position in mm (KiCad schematic coordinates)
  double rotation        = 7;  // Orientation in degrees (0, 90, 180, 270)
  BoundingBox bbox       = 8;  // Bounding box in mm (body + pins)
  string footprint       = 9;
  repeated ComponentFieldSummary fields = 10;
}

// Get connectivity netlist: net name -> list of (reference, pin_number) for current sheet
message GetNetlist
{
}

message NetPinRef
{
  string reference   = 1;  // Component reference (e.g. "R1", "U1")
  string pin_number  = 2;  // Pin number as string (e.g. "1", "2")
}

message NetEntry
{
  string net_name = 1;
  repeated NetPinRef pins = 2;
}

message GetNetlistResponse
{
  repeated NetEntry nets = 1;
}

// Get concise summary of current schematic (components + global nets)
message GetSchematicSummary
{
}

message GetSchematicSummaryResponse
{
  string sheet_path = 1;
  repeated ComponentSummary components = 2;
  repeated string global_net_names = 3;
  // Current snapping grid: step in mm (use for placement so items snap). Display string e.g. "0.1 mm" or "100 mils".
  double grid_step_mm = 4;
  string grid_display = 5;  // Human-readable grid (units) for agent context
}

// Capture schematic view centered at (center_x_mm, center_y_mm). Returns PNG as base64.
message CaptureScreenshot
{
  double center_x_mm = 1;
  double center_y_mm = 2;
}

// Capture a zoomed-in zone of the schematic centered at (center_x_mm, center_y_mm).
// width_mm = visible width in mm (default 15); smaller = more zoomed in.
// max_width_px = if > 0, resize image to this max width (reduces token/file size for vision APIs)
message CaptureZoneScreenshot
{
  double center_x_mm = 1;
  double center_y_mm = 2;
  double width_mm = 3;  // Visible width in mm (default 15 for zoomed-in detail view)
  int32 max_width_px = 4;  // If > 0, resize output to this max width; 0 = no resize
}

// Capture the entire schematic fitted to view.
// target_width_px = if > 0, render at this width for better text legibility (larger canvas)
message CaptureFullSchematic
{
  int32 target_width_px = 1;  // If > 0, resize canvas to this width before capture; 0 = use current
}

// Return currently visible schematic viewport bounds in mm.
message GetVisibleBounds
{
}

message GetVisibleBoundsResponse
{
  double min_x_mm = 1;
  double min_y_mm = 2;
  double max_x_mm = 3;
  double max_y_mm = 4;
  double center_x_mm = 5;
  double center_y_mm = 6;
  double width_mm = 7;
  double height_mm = 8;
  int32 client_width_px = 9;
  int32 client_height_px = 10;
}

message CaptureScreenshotResponse
{
  string image_png_base64 = 1;
}

// Move and optionally rotate an existing component by reference
message MoveComponent
{
  string reference       = 1;  // Component reference (e.g. "R1", "U1")
  PointMM position       = 2;  // New position in mm (KiCad coordinates)
  optional double rotation = 3;  // New orientation in degrees (0, 90, 180, 270); omit to keep current
  kiapi.common.types.KIID commit_id = 4;
}

message MoveComponentResponse
{
}

// Set the Footprint field of an existing schematic component by reference.
message SetComponentFootprint
{
  string reference                  = 1; // Component reference (e.g. "R1", "U1")
  string footprint                  = 2; // Full footprint LIB_ID, e.g. "Resistor_SMD:R_0603_1608Metric"
  kiapi.common.types.KIID commit_id = 3;
}

message SetComponentFootprintResponse
{
  string reference     = 1;
  string old_footprint = 2;
  string new_footprint = 3;
}

// Set arbitrary symbol properties/fields on an existing schematic component.
message SetComponentFields
{
  string reference                         = 1;
  repeated ComponentFieldSummary fields    = 2;
  kiapi.common.types.KIID commit_id        = 3;
}

message SetComponentFieldsResponse
{
  string reference                      = 1;
  repeated ComponentFieldSummary fields = 2;
}

// Delete a component from the schematic by reference designator (within an active commit)
message DeleteComponent
{
  string reference                   = 1;  // Component reference (e.g. "R1", "U1")
  kiapi.common.types.KIID commit_id  = 2;
}

message DeleteComponentResponse
{
}

// Reload project sym-lib-table from disk into the running schematic editor and refresh library caches.
message ReloadProjectSymbolLibraries
{
}

message ReloadProjectSymbolLibrariesResponse
{
  bool ok = 1;
  string error_message = 2;
  string sym_lib_table_path = 3;
}

// Append one row to the project symbol library table (in-memory + save to sym-lib-table file).
// URI should use ${KIPRJMOD}/... for project-local assets.
message AppendProjectSymbolLibraryRow
{
  string library_nickname = 1;
  string uri = 2;
  string description = 3;
  // If true and nickname exists, replace the row; if false, skip and set skipped_duplicate.
  bool replace_existing = 4;
}

message AppendProjectSymbolLibraryRowResponse
{
  bool ok = 1;
  string error_message = 2;
  bool skipped_duplicate = 3;
  bool wrote_file = 4;
}

// Write a symbol library file (.kicad_sym) to the project directory and register
// it in the project sym-lib-table. KiCad writes the file at
// ${KIPRJMOD}/relative_path and calls AppendProjectSymbolLibraryRow.
message WriteSymbolLibraryFile
{
  string relative_path    = 1;  // Path relative to KIPRJMOD, e.g. ".copper/imports/lcsc/C3188827/CopperImported.kicad_sym"
  bytes  content          = 2;  // Raw .kicad_sym file content
  string library_nickname = 3;  // Nickname to register in sym-lib-table (e.g. "CopperImported")
  string description      = 4;  // Optional description for the lib-table entry
  bool   replace_existing = 5;  // If true, overwrite existing file and update existing table entry
}

message WriteSymbolLibraryFileResponse
{
  bool   ok              = 1;
  string error_message   = 2;
  string resolved_path   = 3;  // Absolute path where the file was written
  bool   skipped_existing_row = 4;  // Nickname already registered; row left untouched
  string existing_uri         = 5;  // URI the existing row points at (when skipped)
}

// Write a footprint file (.kicad_mod) into a .pretty directory under the project
// and register that directory in the project fp-lib-table file. The parent
// directory of relative_path is registered as the library URI. Used as the cloud
// fallback when the adapter has no project filesystem access (sibling of
// WriteSymbolLibraryFile). The fp-lib-table file is edited on disk; pcbnew picks
// it up when the board is opened or Update PCB from Schematic runs.
message WriteFootprintLibraryFile
{
  string relative_path    = 1;  // Path relative to KIPRJMOD, e.g. ".copper/imports/lcsc/C3188827/CopperImported.pretty/VQFN-24.kicad_mod"
  bytes  content          = 2;  // Raw .kicad_mod file content
  string library_nickname = 3;  // Nickname to register in fp-lib-table (e.g. "CopperImported")
  string description      = 4;  // Optional description for the lib-table entry
  bool   replace_existing = 5;  // If true, overwrite existing file and update existing table entry
  bool   skip_table_registration = 6;  // If true, write the file only — no fp-lib-table edit (used for .3dshapes model files)
}

message WriteFootprintLibraryFileResponse
{
  bool   ok              = 1;
  string error_message   = 2;
  string resolved_path   = 3;  // Absolute path where the file was written
  bool   skipped_existing_row = 4;  // Nickname already registered; row left untouched
  string existing_uri         = 5;  // URI the existing row points at (when skipped)
}

// Navigate Eeschema to a hierarchical sheet. Accepts either the human-readable
// path ("/", "/Power", "/USB Hub") or the KIID path as returned by
// SCH_SHEET_PATH::PathAsString() ("/", "/<uuid>/", "/<uuid>/<uuid>/").
// CONTRACT (cross-repo): AS_BAD_REQUEST + "not found" in the error message means
// the sheet does not exist in the live editor; the adapter uses that to trigger a
// project reload (see CopperV3 mcp_handler_schematic_ops.cpp, ensureSheetActive).
message NavigateToSheet
{
  string sheet_path = 1;
}

message NavigateToSheetResponse
{
  string sheet_path_human = 1;  // "/" for root, else "/Power" (no trailing slash)
  string sheet_path_uuid  = 2;  // PathAsString() form
  string file_name        = 3;  // .kicad_sch file backing the sheet screen
  bool   changed          = 4;  // false when the sheet was already current
}

// One hierarchical port to create with its parent block sheet.
message SheetPortDef
{
  string name      = 1;  // hierarchical label / sheet pin text
  string direction = 2;  // "input" | "output" | "bidirectional"
  string side      = 3;  // "left" | "right" | "top" | "bottom"
}

// Create a new child hierarchical sheet inside the specified parent sheet.
// KiCad creates the child .kicad_sch file on the user's filesystem, inserts the
// sheet symbol in the parent, and saves the whole project.
message CreateBlockSheet
{
  string parent_sheet_path  = 1;  // "/" for root; human or UUID path
  string sheet_name         = 2;  // display name on the sheet symbol
  string sheet_file         = 3;  // optional filename; auto-derived if empty
  double x_mm               = 4;  // sheet symbol top-left X in parent coords
  double y_mm               = 5;
  double width_mm           = 6;  // default 50.8
  double height_mm          = 7;  // default 38.1
  bool   overwrite_existing = 8;
  repeated SheetPortDef ports = 9;
}

message CreateBlockSheetResponse
{
  bool   ok              = 1;
  string error_message   = 2;
  string sheet_path      = 3;  // human path e.g. "/Power"
  string sheet_path_uuid = 4;  // KiCad PathAsString() e.g. "/<uuid>/"
  string file_name       = 5;  // child .kicad_sch filename (relative)
  string file_path       = 6;  // absolute path to child file
  repeated string warnings = 7;
}

// Add (or update) a hierarchical port on an existing child sheet.
// Creates a SCH_HIERLABEL in the child screen and a matching SCH_SHEET_PIN on
// the sheet symbol in the parent, then saves.
message AddSheetPort
{
  string sheet_path        = 1;  // the CHILD sheet e.g. "/Power"
  string name              = 2;  // port name / hierarchical label text
  string direction         = 3;  // "input" | "output" | "bidirectional"
  string side              = 4;  // "left" | "right" | "top" | "bottom"
  double x_mm              = 5;  // explicit hier-label position (0 = auto)
  double y_mm              = 6;
  bool   update_parent_pin  = 7;  // default true
  bool   update_child_label = 8;  // default true
}

message AddSheetPortResponse
{
  bool   ok            = 1;
  string error_message = 2;
  string port_name     = 3;
  double pin_x_mm      = 4;
  double pin_y_mm      = 5;
  repeated string warnings = 6;
}



// Read the full schematic hierarchy from the running editor's in-memory model.
// IPC-backed replacement for disk-based hierarchy parsing: works without any
// filesystem access to the user's project (Docker / swarm safe), and reflects
// unsaved edits the editor holds.
message GetHierarchy
{
  bool include_ports = 1;  // include sheet pins + child hierarchical labels
}

// One port: a sheet pin on a sheet symbol, or a hierarchical label in a screen.
message HierarchyPortInfo
{
  string name         = 1;
  string direction    = 2;  // input | output | bidirectional | tri_state | passive
  string side         = 3;  // left | right | top | bottom (empty when unknown)
  double x_mm         = 4;
  double y_mm         = 5;
  double rotation_deg = 6;
  string uuid         = 7;
}

// One sheet in the hierarchy (root included).
message HierarchySheetInfo
{
  string name              = 1;
  string file_name         = 2;
  string file_path         = 3;
  string sheet_path        = 4;   // human form: "/" for root, else "/Power"
  string sheet_id_path     = 5;   // "/<rootUuid>/<childUuid>" (root uuid included)
  string parent_sheet_path = 6;   // human form; empty for root
  string parent_file_path  = 7;
  string uuid              = 8;
  int32  depth             = 9;
  double x_mm              = 10;
  double y_mm              = 11;
  double width_mm          = 12;
  double height_mm         = 13;
  repeated HierarchyPortInfo parent_pins  = 14;  // sheet pins on this sheet's symbol
  repeated HierarchyPortInfo child_labels = 15;  // hierarchical labels in this sheet's screen
}

message GetHierarchyResponse
{
  bool   ok                 = 1;
  string error_message      = 2;
  string project_name       = 3;
  string project_dir        = 4;
  string root_file_path     = 5;
  string root_uuid          = 6;   // the uuid PathAsString() omits for the root
  string current_sheet_path = 7;   // PathAsString() of the active sheet
  repeated HierarchySheetInfo sheets = 8;
  repeated string warnings  = 9;
}

// ── Sub-sheet CRUD: move/delete sheets and ports (IPC-backed) ──────────────

// Move (and optionally resize) an existing child sheet symbol on its parent.
message MoveSheet
{
  string sheet_path = 1;   // child sheet to move (human or id path)
  double x_mm       = 2;   // new top-left X of the sheet symbol (mm)
  double y_mm       = 3;   // new top-left Y of the sheet symbol (mm)
  double width_mm   = 4;   // optional new width;  <= 0 keeps current
  double height_mm  = 5;   // optional new height; <= 0 keeps current
}

message MoveSheetResponse
{
  bool   ok            = 1;
  string error_message = 2;
  string sheet_path    = 3;
  double x_mm          = 4;
  double y_mm          = 5;
  double width_mm      = 6;
  double height_mm     = 7;
  repeated string warnings = 8;
}

// Delete a child sheet: removes the sheet symbol (and its pins) from the parent.
// The child .kicad_sch file is left on disk unless delete_file is true.
message DeleteSheet
{
  string sheet_path  = 1;
  bool   delete_file = 2;
}

message DeleteSheetResponse
{
  bool   ok            = 1;
  string error_message = 2;
  string sheet_path    = 3;
  bool   file_deleted  = 4;
  repeated string warnings = 5;
}

// Move/reposition an existing hierarchical port (sheet pin) on a child sheet.
// Provide side to snap it to an edge, or x_mm/y_mm for an explicit position.
message MoveSheetPort
{
  string sheet_path = 1;   // child sheet
  string name       = 2;   // port name (sheet pin / hierarchical label text)
  string side       = 3;   // optional new edge: left|right|top|bottom
  double x_mm       = 4;   // optional explicit position
  double y_mm       = 5;
}

message MoveSheetPortResponse
{
  bool   ok            = 1;
  string error_message = 2;
  string name          = 3;
  double x_mm          = 4;
  double y_mm          = 5;
  string side          = 6;
  repeated string warnings = 7;
}

// Delete a hierarchical port: removes the sheet pin on the parent sheet symbol
// and, when delete_child_label is true, the matching hierarchical label inside
// the child sheet.
message DeleteSheetPort
{
  string sheet_path        = 1;
  string name              = 2;
  bool   delete_child_label = 3;
}

message DeleteSheetPortResponse
{
  bool   ok            = 1;
  string error_message = 2;
  string name          = 3;
  bool   pin_removed   = 4;
  bool   label_removed = 5;
  repeated string warnings = 6;
}
